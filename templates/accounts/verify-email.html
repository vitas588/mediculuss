{% extends 'base.html' %}
{% block title %}Підтвердження email — Mediculus{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <i class="bi bi-envelope-check-fill text-primary" style="font-size:3rem"></i>
                <h2 class="fw-bold mt-2">Підтвердження email</h2>
                <p class="text-muted">Введіть 6-значний код, надісланий на вашу пошту</p>
            </div>
            <div class="alert alert-success d-none" id="verify-success">
                <i class="bi bi-check-circle me-2"></i><span id="verify-success-msg"></span>
                <div class="mt-3 d-none" id="verify-profile-link">
                    <a href="/profile/" class="btn btn-primary btn-sm">
                        <i class="bi bi-person-circle me-1"></i>Перейти до профілю
                    </a>
                </div>
            </div>
            <div class="alert alert-danger d-none" id="verify-error">
                <i class="bi bi-exclamation-triangle me-2"></i><span id="verify-error-msg"></span>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="mb-3 text-center">
                        <span class="text-muted small">Код надіслано на:</span>
                        <p class="fw-semibold mb-0" id="verify-email-display">—</p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Код підтвердження</label>
                        <input type="text" class="form-control form-control-lg text-center fw-bold"
                               id="verify-code" maxlength="6" placeholder="000000"
                               style="letter-spacing:0.3em; font-size:1.5rem">
                    </div>
                    <button class="btn btn-primary w-100 py-2 mb-2" id="verify-btn">
                        <span class="spinner-border spinner-border-sm d-none me-2" id="verify-spinner"></span>
                        <i class="bi bi-check-circle me-1"></i>Підтвердити
                    </button>
                    <button class="btn btn-outline-secondary w-100" id="resend-btn">
                        <span class="spinner-border spinner-border-sm d-none me-2" id="resend-spinner"></span>
                        <i class="bi bi-envelope me-1"></i>Надіслати код повторно
                    </button>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="/register/" class="text-muted small">← Повернутись до реєстрації</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="/static/js/verify-email.js"></script>
{% endblock %}

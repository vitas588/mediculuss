{% extends 'base.html' %}
{% block title %}Відновлення пароля — Mediculus{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <i class="bi bi-key-fill text-primary" style="font-size:3rem"></i>
                <h2 class="fw-bold mt-2">Відновлення пароля</h2>
                <p class="text-muted">Введіть ваш email для отримання посилання на скидання пароля</p>
            </div>
            <div class="alert alert-success d-none" id="fp-success">
                <i class="bi bi-check-circle me-2"></i><span id="fp-success-msg"></span>
            </div>
            <div class="alert alert-danger d-none" id="fp-error">
                <i class="bi bi-exclamation-triangle me-2"></i><span id="fp-error-msg"></span>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-envelope text-muted"></i>
                            </span>
                            <input type="email" class="form-control" id="fp-email"
                                   placeholder="your@email.com" required autocomplete="email">
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 py-2" id="fp-btn">
                        <span class="spinner-border spinner-border-sm d-none me-2" id="fp-spinner"></span>
                        <i class="bi bi-envelope me-1"></i>Надіслати посилання
                    </button>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="/login/" class="text-muted small">← Повернутись до входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="/static/js/forgot-password.js"></script>
{% endblock %}
